name: EGO Validate

on:
  pull_request:
    branches: [ "main", "gnome43-44" ]
    paths:
      - 'metadata.json'
      - 'extension.js'
      - 'extension-esm.js'
      - 'prefs.js'
      - 'prefs-es6.js'
      - 'Makefile'
      - 'tools/**'
      - 'schemas/**'
      - 'icons/**'
      - '*.sh'
      - 'README.md'
  push:
    branches: [ "main", "gnome43-44" ]
    paths:
      - 'metadata.json'
      - 'extension.js'
      - 'extension-esm.js'
      - 'prefs.js'
      - 'prefs-es6.js'
      - 'Makefile'
      - 'tools/**'
      - 'schemas/**'
      - 'icons/**'
      - '*.sh'
      - 'README.md'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies (glib tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-bin unzip

      - name: Build zips
        run: |
          make dist

      - name: Validate EGO zip
        run: |
          make ego-validate
