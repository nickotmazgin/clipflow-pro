name: Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

jobs:
  eslint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run ESLint
        run: |
          npx -y eslint@9 \
            extension.js \
            extension-esm.js \
            prefs-es6.js \
            tools/history-window/clipboardInsert.js \
            tools/history-window/clipboard-set-runner.js \
            tools/history-window/insert-runner.js \
            eslint.config.cjs
