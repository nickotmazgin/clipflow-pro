name: Release Publish

on:
  push:
    tags:
      - 'v*-gnome45-50'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6

      - name: Install dependencies (glib tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-bin unzip

      - name: Build and validate release zip
        run: |
          ./create-release-zips.sh
          make release-validate

      - name: Resolve version and zip path
        id: meta
        run: |
          VERSION=$(python3 -c "import json; m=json.load(open('metadata.json')); print((m.get('version-name') or '').split()[0])")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "zip=dist/clipflow-pro@nickotmazgin.github.io-${VERSION}-gs45-50.zip" >> "$GITHUB_OUTPUT"

      - name: Build release notes from CHANGELOG
        run: |
          python3 tools/release_notes_from_changelog.py "${{ steps.meta.outputs.version }}" > /tmp/release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          ZIP="${{ steps.meta.outputs.zip }}"
          VERSION="${{ steps.meta.outputs.version }}"
          TITLE="ClipFlow Pro ${VERSION} — GNOME 45–50"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ZIP" --clobber
            gh release edit "$TAG" --title "$TITLE" --notes-file /tmp/release-notes.md
          else
            gh release create "$TAG" "$ZIP" --title "$TITLE" --notes-file /tmp/release-notes.md
          fi

      - name: Attest release zip (Sigstore)
        continue-on-error: true
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ steps.meta.outputs.zip }}
          push-to-registry: false
