name: Release Validate

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'metadata.json'
      - 'extension.js'
      - 'extension-esm.js'
      - 'prefs-es6.js'
      - 'stylesheet.css'
      - 'Makefile'
      - 'tools/**'
      - 'schemas/**'
      - 'icons/**'
      - 'locale/**'
      - '.github/workflows/**'
      - '*.sh'
      - 'README.md'
      - 'CHANGELOG.md'
      - '.gitignore'
  push:
    branches: [ "main" ]
    paths:
      - 'metadata.json'
      - 'extension.js'
      - 'extension-esm.js'
      - 'prefs-es6.js'
      - 'stylesheet.css'
      - 'Makefile'
      - 'tools/**'
      - 'schemas/**'
      - 'icons/**'
      - 'locale/**'
      - '.github/workflows/**'
      - '*.sh'
      - 'README.md'
      - 'CHANGELOG.md'
      - '.gitignore'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies (glib tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-bin unzip

      - name: Build zips
        run: |
          make dist

      - name: Validate release zip
        run: |
          make release-validate
